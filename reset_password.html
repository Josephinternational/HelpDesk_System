<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <h2>Reset Password</h2>

  <input id="pass" type="password" placeholder="New password (min 6 chars)" />
  <button id="btn">Reset</button>

  <p id="msg"></p>

  <script>
    const API = "http://localhost/helpdesk/api";

    function getToken() {
      const p = new URLSearchParams(location.search);
      return p.get("token") || "";
    }

    document.getElementById("btn").addEventListener("click", async () => {
      const token = getToken();
      const new_password = document.getElementById("pass").value;
      const msg = document.getElementById("msg");

      if (!token) {
        msg.textContent = "Missing token.";
        return;
      }

      const res = await fetch(`${API}/auth_reset_password.php`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, new_password })
      });

      const data = await res.json().catch(() => ({}));
      msg.textContent = data.message || "Done.";

      if (data.ok) {
        setTimeout(() => location.href = "index.html", 1200);
      }
    });
  </script>
</body>
</html>
