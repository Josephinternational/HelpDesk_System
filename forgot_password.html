<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <h2>Forgot Password</h2>

  <input id="email" type="email" placeholder="Enter your email" />
  <button id="btn">Send reset link</button>

  <p id="msg"></p>
  <p id="devlink"></p>

  <script>
    const API = "http://localhost/helpdesk/api";

    document.getElementById("btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");
      const devlink = document.getElementById("devlink");
      msg.textContent = "";
      devlink.textContent = "";

      const res = await fetch(`${API}/auth_forgot_password.php`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await res.json().catch(() => ({}));
      msg.textContent = data.message || "Done.";

      // dev only (works without email)
      if (data.dev_reset_link) {
        devlink.innerHTML = `Reset link (dev): <a href="${data.dev_reset_link}">${data.dev_reset_link}</a>`;
      }
    });
  </script>
</body>
</html>
